<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://firestore.googleapis.com https://darkblue-toad-531724.hostingersite.com; img-src 'self' data: https://*.googleusercontent.com; frame-src https://accounts.google.com https://*.firebaseapp.com;">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e293b">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<title>Admin — Invest UA</title>
<link rel="stylesheet" href="styles.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  body { line-height: 1.5; }
  .admin-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .admin-header h1 { text-align: left; margin: 0; }
  .admin-stats {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
  }
  .admin-stat {
    flex: 1;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .admin-stat-value { font-size: 28px; font-weight: 700; color: #f1f5f9; }
  .admin-stat-label { font-size: 12px; color: #64748b; margin-top: 4px; }
  .admin-stat-value.green { color: #4ade80; }
  .admin-stat-value.blue { color: #60a5fa; }
  .admin-stat-value.yellow { color: #facc15; }
  .user-list { display: flex; flex-direction: column; gap: 8px; }
  .user-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 14px 16px;
    transition: border-color 0.2s;
  }
  .user-card:hover { border-color: #475569; }
  .user-card img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid #334155;
  }
  .user-card-info { flex: 1; min-width: 0; }
  .user-card-name { font-size: 14px; font-weight: 600; color: #f1f5f9; }
  .user-card-email { font-size: 12px; color: #64748b; }
  .user-card-meta {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: #475569;
    margin-top: 2px;
  }
  .user-card-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .admin-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    background: rgba(59,130,246,0.12);
    color: #60a5fa;
    margin-left: 6px;
  }
  .disabled-badge {
    background: rgba(248,113,113,0.12);
    color: #f87171;
  }
  .btn-sm {
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid #334155;
    background: transparent;
    color: #94a3b8;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    width: auto;
    margin: 0;
    transition: all 0.2s;
  }
  .btn-sm:hover { border-color: #3b82f6; color: #e2e8f0; }
  .btn-sm.danger { border-color: #f87171; color: #f87171; }
  .btn-sm.danger:hover { background: rgba(248,113,113,0.1); }
  .btn-sm.success { border-color: #4ade80; color: #4ade80; }
  .search-input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #334155;
    border-radius: 10px;
    background: #0f172a;
    color: #f1f5f9;
    font-size: 14px;
    outline: none;
    margin-bottom: 16px;
  }
  .search-input:focus { border-color: #3b82f6; }
  .search-input::placeholder { color: #475569; }
  .access-denied {
    text-align: center;
    padding: 80px 20px;
    color: #64748b;
    font-size: 15px;
  }
  .access-denied .icon { font-size: 48px; margin-bottom: 16px; }
  @media (max-width: 768px) {
    .admin-stats { flex-direction: column; }
    .user-card { flex-wrap: wrap; }
    .user-card-actions { width: 100%; justify-content: flex-end; }
  }
</style>
</head>
<body>

<div class="container">
  <div id="loading" class="access-denied">
    <div class="icon">⏳</div>
    <p>Завантаження...</p>
  </div>

  <div id="accessDenied" class="access-denied" style="display:none">
    <div class="icon">🚫</div>
    <p>Доступ заборонено</p>
    <p style="font-size:13px;margin-top:8px">Ця сторінка доступна тільки адміністраторам.</p>
    <a href="index.html" class="back-link" style="margin-top:16px">← Повернутися до додатку</a>
  </div>

  <div id="adminContent" style="display:none">
    <div class="admin-header">
      <div>
        <h1>Admin Panel</h1>
        <p style="font-size:13px;color:#64748b">Invest UA — управління користувачами</p>
      </div>
      <a href="index.html" class="back-link">← Назад</a>
    </div>

    <div class="admin-stats" id="adminStats"></div>

    <!-- Maintenance mode -->
    <div style="background:#0f172a;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:24px">
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
        <input type="checkbox" id="maintenanceMode" onchange="toggleMaintenance()" style="width:18px;height:18px;accent-color:#f59e0b">
        <div>
          <div style="font-size:14px;color:#f1f5f9;font-weight:600">Режим обслуговування</div>
          <div style="font-size:12px;color:#64748b">Інші користувачі бачитимуть повідомлення що сайт на обслуговуванні</div>
        </div>
      </label>
      <div id="maintenanceFields" style="display:none;margin-top:12px">
        <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px">Повідомлення для користувачів</label>
        <input type="text" id="maintenanceMessage" class="search-input" style="margin:0" placeholder="Сайт оновлюється, зачекайте кілька хвилин..." value="Сайт на обслуговуванні. Ми працюємо над покращенням — скоро повернемось!">
        <button class="btn-sm" onclick="saveMaintenance()" style="margin-top:8px;padding:8px 16px">Зберегти</button>
      </div>
      <p id="maintenanceStatus" style="font-size:12px;margin-top:6px;display:none"></p>
    </div>

    <!-- Telegram settings -->
    <div style="background:#0f172a;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:24px">
      <h3 style="font-size:15px;color:#f1f5f9;margin-bottom:12px;display:flex;align-items:center;gap:8px">
        <span style="font-size:20px">🤖</span> Telegram Bot
      </h3>
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:end">
        <div style="flex:1;min-width:200px">
          <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px">Bot Token</label>
          <input type="text" id="tgBotToken" class="search-input" style="margin:0" placeholder="123456:ABC-DEF...">
        </div>
        <div style="min-width:150px">
          <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px">Chat ID</label>
          <input type="text" id="tgChatId" class="search-input" style="margin:0" placeholder="-1001234567890">
        </div>
        <button class="btn-sm" onclick="saveTelegramConfig()" style="padding:10px 20px;height:fit-content">Зберегти</button>
        <button class="btn-sm" onclick="testTelegram()" style="padding:10px 20px;height:fit-content">Тест</button>
      </div>
      <p id="tgStatus" style="font-size:12px;margin-top:8px;display:none"></p>
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid #334155">
        <p style="font-size:12px;color:#64748b;margin-bottom:10px">Сповіщення адміністратору:</p>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#e2e8f0;cursor:pointer;margin-bottom:6px">
          <input type="checkbox" id="tgNotifyLogin" onchange="saveTelegramConfig()" style="width:16px;height:16px;accent-color:#3b82f6">
          Повідомляти при кожному логіні
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#e2e8f0;cursor:pointer">
          <input type="checkbox" id="tgNotifyNewUser" onchange="saveTelegramConfig()" checked style="width:16px;height:16px;accent-color:#3b82f6">
          Повідомляти при реєстрації нового користувача
        </label>
      </div>
    </div>

    <!-- Email newsletter -->
    <div style="background:#0f172a;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:24px">
      <h3 style="font-size:15px;color:#f1f5f9;margin-bottom:12px;display:flex;align-items:center;gap:8px">
        <span style="font-size:20px">📧</span> Розсилка користувачам
      </h3>
      <div style="margin-bottom:12px">
        <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px">Кому</label>
        <select id="emailTarget" class="search-input" style="margin:0;width:100%">
          <option value="all">Всім користувачам</option>
          <option value="active">Активним за тиждень</option>
          <option value="telegram">З підключеним Telegram</option>
        </select>
      </div>
      <div style="margin-bottom:12px">
        <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px">Тема листа</label>
        <input type="text" id="emailSubject" class="search-input" style="margin:0" placeholder="Invest UA — нові можливості" value="Invest UA — оновлення">
      </div>
      <div style="margin-bottom:12px">
        <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px">Текст повідомлення (HTML)</label>
        <textarea id="emailBody" style="width:100%;min-height:200px;padding:12px;border:1px solid #334155;border-radius:10px;background:#1e293b;color:#f1f5f9;font-size:14px;font-family:inherit;outline:none;resize:vertical;line-height:1.6" placeholder="Вітаємо! В Invest UA з'явились нові можливості..."></textarea>
      </div>
      <div style="margin-bottom:10px">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#e2e8f0;cursor:pointer">
          <input type="checkbox" id="emailAlsoTelegram" checked style="width:16px;height:16px;accent-color:#3b82f6">
          Також надіслати в Telegram
        </label>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-sm" onclick="previewEmail()" style="padding:10px 20px">Попередній перегляд</button>
        <button class="btn-sm" onclick="sendNewsletter()" style="padding:10px 20px;background:#22c55e">Надіслати</button>
      </div>
      <div id="emailPreview" style="display:none;margin-top:12px;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px"></div>
      <p id="emailStatus" style="font-size:12px;margin-top:8px;display:none"></p>
    </div>

    <input type="text" class="search-input" id="searchInput" placeholder="Пошук за ім'ям або email..." oninput="filterUsers()">

    <div class="user-list" id="userList"></div>

    <!-- Feedback section -->
    <div style="margin-top:24px">
      <h3 style="font-size:15px;color:#f1f5f9;margin-bottom:12px;display:flex;align-items:center;gap:8px">
        <span style="font-size:20px">💬</span> Зворотний зв'язок
        <span id="feedbackCount" style="font-size:12px;color:#64748b;font-weight:400"></span>
      </h3>
      <div id="feedbackList"></div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
  let db, currentUser, allUsers = [];

  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.firestore();

  function adminApiFetch(path, data) {
    const apiBase = typeof NOTIFY_API_BASE !== 'undefined' ? NOTIFY_API_BASE : '';
    const apiKey = typeof NOTIFY_API_KEY !== 'undefined' ? NOTIFY_API_KEY : '';
    return fetch(apiBase + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey },
      body: JSON.stringify(data)
    });
  }

  firebase.auth().onAuthStateChanged(async user => {
    document.getElementById('loading').style.display = 'none';

    if (!user) {
      document.getElementById('accessDenied').style.display = 'block';
      return;
    }
    currentUser = user;

    // Check if admin
    try {
      const doc = await db.collection('users').doc(user.uid).get();
      if (!doc.exists || !doc.data().meta || !doc.data().meta.isAdmin) {
        document.getElementById('accessDenied').style.display = 'block';
        return;
      }
    } catch(e) {
      document.getElementById('accessDenied').style.display = 'block';
      return;
    }

    document.getElementById('adminContent').style.display = 'block';
    loadUsers();
    loadMaintenance();
    loadTelegramConfig();
    loadFeedback();
  });

  async function loadUsers() {
    try {
      const snapshot = await db.collection('users').get();
      allUsers = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        if (data.meta) {
          allUsers.push({ id: doc.id, ...data.meta, lastSeen: data.meta.lastSeen || null, profile: data.profile || {} });
        }
      });
      allUsers.sort((a, b) => (b.lastLogin || '').localeCompare(a.lastLogin || ''));
      renderStats();
      renderUsers(allUsers);
    } catch(e) {
      console.error('Load users failed:', e);
    }
  }

  function renderStats() {
    const now = new Date();
    const day = 24 * 60 * 60 * 1000;
    const activeToday = allUsers.filter(u => u.lastLogin && (now - new Date(u.lastLogin)) < day).length;
    const activeWeek = allUsers.filter(u => u.lastLogin && (now - new Date(u.lastLogin)) < 7 * day).length;
    const tgConnected = allUsers.filter(u => u.profile?.notifyTelegram && u.profile?.telegramChatId).length;
    const onlineNow = allUsers.filter(u => u.lastSeen && (now - new Date(u.lastSeen)) < 3 * 60 * 1000).length;

    document.getElementById('adminStats').innerHTML = `
      <div class="admin-stat">
        <div class="admin-stat-value">${allUsers.length}</div>
        <div class="admin-stat-label">Всього</div>
      </div>
      <div class="admin-stat">
        <div class="admin-stat-value green">${onlineNow}</div>
        <div class="admin-stat-label">Online</div>
      </div>
      <div class="admin-stat">
        <div class="admin-stat-value green">${activeToday}</div>
        <div class="admin-stat-label">Сьогодні</div>
      </div>
      <div class="admin-stat">
        <div class="admin-stat-value blue">${activeWeek}</div>
        <div class="admin-stat-label">За тиждень</div>
      </div>
      <div class="admin-stat">
        <div class="admin-stat-value" style="color:#60a5fa">${tgConnected}</div>
        <div class="admin-stat-label">Telegram</div>
      </div>
      <div class="admin-stat">
        <div class="admin-stat-value yellow">${allUsers.filter(u => u.isAdmin).length}</div>
        <div class="admin-stat-label">Адміни</div>
      </div>
    `;
  }

  function renderUsers(users) {
    if (users.length === 0) {
      document.getElementById('userList').innerHTML = '<p style="text-align:center;color:#475569;padding:20px">Користувачів не знайдено</p>';
      return;
    }

    document.getElementById('userList').innerHTML = users.map(u => {
      const lastLogin = u.lastLogin ? new Date(u.lastLogin).toLocaleString('uk-UA') : '—';
      const isMe = u.uid === currentUser.uid;
      const disabled = u.disabled;
      const isOnline = u.lastSeen && (Date.now() - new Date(u.lastSeen).getTime()) < 3 * 60 * 1000;

      return `
        <div class="user-card" id="user-${u.id}">
          <img src="${u.photoURL || ''}" alt="" referrerpolicy="no-referrer" onerror="this.style.display='none'">
          <div class="user-card-info">
            <div class="user-card-name">
              ${u.profile?.displayName || u.displayName || 'Без імені'}
              ${isOnline ? '<span class="admin-badge" style="background:rgba(74,222,128,0.15);color:#4ade80">Online</span>' : ''}
              ${u.isAdmin ? '<span class="admin-badge">Admin</span>' : ''}
              ${disabled ? '<span class="admin-badge disabled-badge">Заблоковано</span>' : ''}
              ${isMe ? '<span style="color:#64748b;font-size:11px;margin-left:4px">(ви)</span>' : ''}
            </div>
            <div class="user-card-email">${u.email || '—'}</div>
            <div class="user-card-meta">
              <span>Останній вхід: ${lastLogin}</span>
              <span>${u.provider || ''}</span>
              ${u.profile?.phone ? '<span>' + u.profile.phone + '</span>' : ''}
              ${u.profile?.language ? '<span>' + u.profile.language.toUpperCase() + '</span>' : ''}
              ${u.profile?.notifyTelegram && u.profile?.telegramChatId ? '<span class="admin-badge" style="background:rgba(59,130,246,0.12);color:#60a5fa">TG ✓</span>' : ''}
              ${u.profile?.notifyTelegram && !u.profile?.telegramChatId ? '<span class="admin-badge" style="background:rgba(250,204,21,0.12);color:#facc15">TG (без ID)</span>' : ''}
            </div>
          </div>
          <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
            <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:#94a3b8;cursor:pointer">
              <input type="checkbox" ${u.profile?.notifyTelegram ? 'checked' : ''} onchange="toggleUserNotify('${u.id}','notifyTelegram',this.checked)" style="width:14px;height:14px;accent-color:#3b82f6">
              Telegram
            </label>
            <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:#94a3b8;cursor:pointer">
              <input type="checkbox" ${u.profile?.notifyEmail ? 'checked' : ''} onchange="toggleUserNotify('${u.id}','notifyEmail',this.checked)" style="width:14px;height:14px;accent-color:#3b82f6">
              Email
            </label>
          </div>
          <div class="user-card-actions">
            ${!isMe ? (u.isAdmin
              ? '<button class="btn-sm danger" onclick="toggleAdmin(\'' + u.id + '\', false)">Зняти admin</button>'
              : '<button class="btn-sm" onclick="toggleAdmin(\'' + u.id + '\', true)">Зробити admin</button>'
            ) : ''}
            ${!isMe ? (disabled
              ? '<button class="btn-sm success" onclick="toggleDisabled(\'' + u.id + '\', false)">Розблокувати</button>'
              : '<button class="btn-sm danger" onclick="toggleDisabled(\'' + u.id + '\', true)">Заблокувати</button>'
            ) : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  function filterUsers() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    if (!q) { renderUsers(allUsers); return; }
    const filtered = allUsers.filter(u =>
      (u.displayName || '').toLowerCase().includes(q) ||
      (u.email || '').toLowerCase().includes(q) ||
      (u.profile?.displayName || '').toLowerCase().includes(q) ||
      (u.profile?.phone || '').includes(q)
    );
    renderUsers(filtered);
  }

  async function toggleUserNotify(uid, field, value) {
    try {
      const update = {};
      update['profile.' + field] = value;
      await db.collection('users').doc(uid).set(
        { profile: { [field]: value } },
        { merge: true }
      );
      const user = allUsers.find(u => u.id === uid);
      if (user && user.profile) user.profile[field] = value;
      renderStats();
    } catch(e) {
      alert('Помилка: ' + e.message);
    }
  }

  async function toggleAdmin(uid, makeAdmin) {
    try {
      await db.collection('users').doc(uid).set({
        meta: { isAdmin: makeAdmin }
      }, { merge: true });
      const user = allUsers.find(u => u.id === uid);
      if (user) user.isAdmin = makeAdmin;
      renderStats();
      renderUsers(allUsers);
    } catch(e) {
      alert('Помилка: ' + e.message);
    }
  }

  async function toggleDisabled(uid, disable) {
    try {
      await db.collection('users').doc(uid).set({
        meta: { disabled: disable }
      }, { merge: true });
      const user = allUsers.find(u => u.id === uid);
      if (user) user.disabled = disable;
      renderUsers(allUsers);
    } catch(e) {
      alert('Помилка: ' + e.message);
    }
  }

  // ---- Telegram ----
  async function loadTelegramConfig() {
    try {
      const doc = await db.collection('settings').doc('telegram').get();
      if (doc.exists) {
        const d = doc.data();
        document.getElementById('tgBotToken').value = d.botToken || '';
        document.getElementById('tgChatId').value = d.chatId || '';
        document.getElementById('tgNotifyLogin').checked = d.notifyLogin !== false;
        document.getElementById('tgNotifyNewUser').checked = d.notifyNewUser !== false;
      }
    } catch(e) { /* ignore */ }
  }

  async function saveTelegramConfig() {
    const botToken = document.getElementById('tgBotToken').value.trim();
    const chatId = document.getElementById('tgChatId').value.trim();
    const notifyLogin = document.getElementById('tgNotifyLogin').checked;
    const notifyNewUser = document.getElementById('tgNotifyNewUser').checked;
    const status = document.getElementById('tgStatus');

    try {
      await db.collection('settings').doc('telegram').set({ botToken, chatId, notifyLogin, notifyNewUser });
      status.textContent = '✓ Збережено';
      status.style.color = '#4ade80';
      status.style.display = 'block';
      setTimeout(() => { status.style.display = 'none'; }, 3000);
    } catch(e) {
      status.textContent = 'Помилка: ' + e.message;
      status.style.color = '#f87171';
      status.style.display = 'block';
    }
  }

  async function testTelegram() {
    const chatId = document.getElementById('tgChatId').value.trim();
    const status = document.getElementById('tgStatus');

    if (!chatId) {
      status.textContent = 'Заповніть Chat ID';
      status.style.color = '#f87171';
      status.style.display = 'block';
      return;
    }

    try {
      const res = await adminApiFetch('/telegram/test', { chat_id: chatId, name: 'Admin' });
      const data = await res.json();
      if (data.ok) {
        status.textContent = '✓ Повідомлення надіслано в Telegram';
        status.style.color = '#4ade80';
      } else {
        status.textContent = 'Помилка: ' + (data.description || 'unknown');
        status.style.color = '#f87171';
      }
      status.style.display = 'block';
      setTimeout(() => { status.style.display = 'none'; }, 5000);
    } catch(e) {
      status.textContent = 'Помилка: ' + e.message;
      status.style.color = '#f87171';
      status.style.display = 'block';
    }
  }

  // ---- Newsletter ----
  function getTargetUsers() {
    const target = document.getElementById('emailTarget').value;
    const now = new Date();
    const week = 7 * 24 * 60 * 60 * 1000;
    return allUsers.filter(u => {
      if (u.disabled) return false;
      if (target === 'active') return u.lastLogin && (now - new Date(u.lastLogin)) < week;
      if (target === 'telegram') return u.profile?.telegramChatId;
      return true;
    });
  }

  function previewEmail() {
    const subject = document.getElementById('emailSubject').value.trim();
    const body = document.getElementById('emailBody').value.trim();
    const preview = document.getElementById('emailPreview');
    const targets = getTargetUsers();

    if (!body) {
      preview.innerHTML = '<p style="color:#f87171">Введіть текст повідомлення</p>';
      preview.style.display = 'block';
      return;
    }

    preview.innerHTML = `
      <div style="font-size:12px;color:#64748b;margin-bottom:8px">Отримувачі: <strong style="color:#f1f5f9">${targets.length}</strong> користувачів</div>
      <div style="font-size:12px;color:#64748b;margin-bottom:12px">Тема: <strong style="color:#f1f5f9">${subject}</strong></div>
      <div style="border-top:1px solid #334155;padding-top:12px;font-size:14px;color:#e2e8f0;line-height:1.6">${body}</div>
    `;
    preview.style.display = 'block';
  }

  async function sendNewsletter() {
    const subject = document.getElementById('emailSubject').value.trim();
    const body = document.getElementById('emailBody').value.trim();
    const alsoTelegram = document.getElementById('emailAlsoTelegram').checked;
    const status = document.getElementById('emailStatus');
    const targets = getTargetUsers();

    if (!body) {
      status.textContent = 'Введіть текст повідомлення';
      status.style.color = '#f87171';
      status.style.display = 'block';
      return;
    }

    if (!confirm('Надіслати повідомлення ' + targets.length + ' користувачам?')) return;

    if (typeof NOTIFY_API_BASE === 'undefined' || !NOTIFY_API_BASE) {
      status.textContent = 'NOTIFY_API_BASE не налаштовано';
      status.style.color = '#f87171';
      status.style.display = 'block';
      return;
    }

    status.textContent = 'Надсилаю... 0/' + targets.length;
    status.style.color = '#94a3b8';
    status.style.display = 'block';

    let sent = 0, errors = 0;

    for (const u of targets) {
      try {
        const email = u.profile?.contactEmail || u.email;
        if (email) {
          await adminApiFetch('/newsletter/send', { email, subject, body, name: u.profile?.displayName || u.displayName || '' });
        }

        if (alsoTelegram && u.profile?.telegramChatId) {
          const plainBody = body.replace(/<[^>]*>/g, '').substring(0, 500);
          await adminApiFetch('/telegram/newsletter', { chat_id: u.profile.telegramChatId, subject, body: plainBody });
        }

        sent++;
      } catch(e) {
        errors++;
      }
      status.textContent = 'Надсилаю... ' + sent + '/' + targets.length;
    }

    status.textContent = '✓ Надіслано: ' + sent + (errors > 0 ? ', помилок: ' + errors : '');
    status.style.color = errors > 0 ? '#facc15' : '#4ade80';
    setTimeout(() => { status.style.display = 'none'; }, 10000);
  }

  // ---- Feedback ----
  async function loadFeedback() {
    try {
      const snapshot = await db.collection('feedback').orderBy('createdAt', 'desc').get();
      const items = [];
      snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));

      document.getElementById('feedbackCount').textContent = items.length ? '(' + items.length + ')' : '';

      if (items.length === 0) {
        document.getElementById('feedbackList').innerHTML = '<p style="color:#475569;font-size:13px">Поки немає відгуків</p>';
        return;
      }

      document.getElementById('feedbackList').innerHTML = items.map(f => {
        const date = f.createdAt ? new Date(f.createdAt).toLocaleString('uk-UA') : '—';
        return `<div style="background:#0f172a;border:1px solid #334155;border-radius:10px;padding:14px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <div>
              <strong style="color:#f1f5f9;font-size:13px">${f.name || 'Анонім'}</strong>
              <span style="color:#64748b;font-size:11px;margin-left:8px">${f.email || ''}</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span style="color:#475569;font-size:11px">${date}</span>
              <button class="btn-sm danger" onclick="deleteFeedback('${f.id}')" style="padding:4px 8px;font-size:11px">✕</button>
            </div>
          </div>
          <p style="color:#e2e8f0;font-size:13px;margin:0;line-height:1.5">${f.text.replace(/</g, '&lt;')}</p>
        </div>`;
      }).join('');
    } catch(e) {
      console.error('Load feedback failed:', e);
    }
  }

  async function deleteFeedback(id) {
    if (!confirm('Видалити цей відгук?')) return;
    try {
      await db.collection('feedback').doc(id).delete();
      loadFeedback();
    } catch(e) {
      alert('Помилка: ' + e.message);
    }
  }

  // ---- Maintenance ----
  async function loadMaintenance() {
    try {
      const doc = await db.collection('settings').doc('maintenance').get();
      if (doc.exists) {
        const d = doc.data();
        document.getElementById('maintenanceMode').checked = !!d.enabled;
        document.getElementById('maintenanceMessage').value = d.message || '';
        document.getElementById('maintenanceFields').style.display = d.enabled ? 'block' : 'none';
      }
    } catch(e) { /* ignore */ }
  }

  function toggleMaintenance() {
    const enabled = document.getElementById('maintenanceMode').checked;
    document.getElementById('maintenanceFields').style.display = enabled ? 'block' : 'none';
    saveMaintenance();
  }

  async function saveMaintenance() {
    const enabled = document.getElementById('maintenanceMode').checked;
    const message = document.getElementById('maintenanceMessage').value.trim();
    const status = document.getElementById('maintenanceStatus');
    try {
      await db.collection('settings').doc('maintenance').set({ enabled, message });
      status.textContent = enabled ? '✓ Режим обслуговування увімкнено' : '✓ Режим обслуговування вимкнено';
      status.style.color = enabled ? '#f59e0b' : '#4ade80';
      status.style.display = 'block';
      setTimeout(() => { status.style.display = 'none'; }, 3000);
    } catch(e) {
      status.textContent = 'Помилка: ' + e.message;
      status.style.color = '#f87171';
      status.style.display = 'block';
    }
  }
</script>

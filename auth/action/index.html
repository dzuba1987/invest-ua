<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invest UA — вхід</title>
<style>
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         background:#0f172a; color:#94a3b8; font-family:system-ui,-apple-system,sans-serif; }
  .box { text-align:center; }
  .spinner { width:32px; height:32px; border:3px solid #334155; border-top-color:#3b82f6;
             border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p>Завершуємо вхід…</p>
</div>
<script>
  // Firebase Auth's "Custom action URL" lands here with mode=signIn|resetPassword|verifyEmail
  // plus oobCode/apiKey query params. The main app at "/" already handles
  // isSignInWithEmailLink on boot, so just forward the query string there.
  (function() {
    var search = window.location.search || '';
    window.location.replace('/' + search);
  })();
</script>
</body>
</html>
